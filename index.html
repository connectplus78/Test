<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
<title>İnadına TV | XTREAM PLAYER</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --bg-deep: #0a0c10; --bg-elevated: #11141c; --bg-surface: rgba(18, 22, 32, 0.92);
    --glass-border: rgba(66, 153, 225, 0.25); --panel1-accent: #00e5ff;
    --success-glow: #00f5b9; --text-primary: #f0f4fa; --text-secondary: #9aa8c4;
    --radius-lg: 18px; --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-deep); font-family: 'Inter', sans-serif; color: var(--text-primary); padding: 24px 20px; min-height: 100vh; }
.wrapper { max-width: 1400px; margin: 0 auto; z-index: 2; }
.section-box { background: var(--bg-surface); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5); margin-bottom: 20px; }
.box-header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-bottom: 14px; margin-bottom: 20px; border-bottom: 1px solid rgba(66, 153, 225, 0.2); }
.box-title { font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, #ffffff, #88ccff); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-buttons { display: flex; gap: 12px; align-items: center; }
.status-badge { background: rgba(0, 245, 185, 0.15); padding: 5px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: var(--success-glow); border: 1px solid rgba(0, 245, 185, 0.4); }
.change-pwd-btn { background: rgba(255, 180, 70, 0.15); padding: 5px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #ffb347; border: 1px solid rgba(255, 180, 70, 0.4); cursor: pointer; transition: var(--transition); }
.change-pwd-btn:hover { background: rgba(255, 180, 70, 0.3); color: #ffcc77; }
.panel-selector { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.panel-btn { flex: 1; min-width: 130px; padding: 12px 0; background: rgba(20, 25, 38, 0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 80px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: var(--transition); color: var(--text-secondary); text-align: center;}
.panel-btn.active { background: linear-gradient(105deg, rgba(0,229,255,0.18) 0%, rgba(0,229,255,0.05) 100%); border-color: var(--panel1-accent); color: white; box-shadow: 0 0 12px rgba(0,229,255,0.3); }
.player-layout { display: flex; flex-direction: column; gap: 20px; }
.view-pane.hidden { display: none; }
.media-browser { background: rgba(8, 10, 16, 0.7); backdrop-filter: blur(8px); border-radius: 20px; border: 1px solid rgba(66,153,225,0.2); overflow: hidden; display: flex; flex-direction: column; height: 580px; }
.browser-tabs { display: flex; border-bottom: 1px solid rgba(66,153,225,0.2); background: rgba(0,0,0,0.3); }
.tab-btn { flex: 1; background: transparent; border: none; padding: 14px 0; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; }
.tab-btn.active { color: var(--panel1-accent); background: rgba(0,229,255,0.08); border-bottom: 2px solid var(--panel1-accent); }
.browser-list { flex: 1; overflow-y: auto; padding: 8px; }
.list-item { padding: 12px 14px; margin-bottom: 6px; background: rgba(18, 22, 30, 0.5); border-radius: 12px; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: var(--transition); display: flex; justify-content: space-between; align-items: center; }
.list-item:hover { background: rgba(0, 229, 255, 0.12); color: white; transform: translateX(4px); }
.is-cat { background: linear-gradient(95deg, rgba(0,229,255,0.08), rgba(0,0,0,0.2)); color: white; font-weight: 700; border-left: 3px solid var(--panel1-accent); }
.locked-badge { background: rgba(255, 100, 100, 0.2); border: 1px solid rgba(255, 100, 100, 0.5); border-radius: 20px; padding: 3px 10px; font-size: 0.65rem; font-weight: 600; color: #ff8888; }
.unlocked-badge { background: rgba(100, 255, 100, 0.15); border: 1px solid rgba(100, 255, 100, 0.4); border-radius: 20px; padding: 3px 10px; font-size: 0.65rem; font-weight: 600; color: #88ff88; }
#browserBack { background: rgba(0, 229, 255, 0.12); padding: 10px; text-align: center; font-size: 0.75rem; font-weight: 600; cursor: pointer; color: #b0e0ff; border-bottom: 1px solid rgba(0,229,255,0.2); }
#browserBack:hover { background: rgba(0, 229, 255, 0.25); }
.video-wrapper { background: #000000aa; backdrop-filter: blur(4px); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; height: 580px; }
.video-inner { flex: 1; background: #000000; position: relative; display: flex; align-items: center; justify-content: center; }
video { width: 100%; height: 100%; object-fit: contain; }
.vid-overlay { position: absolute; color: rgba(255,255,255,0.7); font-size: 0.9rem; background: rgba(0,0,0,0.6); padding: 10px 22px; border-radius: 48px; backdrop-filter: blur(12px); pointer-events: none; }
.epg-display { background: rgba(0, 0, 0, 0.7); padding: 12px 16px; font-size: 0.7rem; color: #aad0ff; border-top: 1px solid rgba(0,229,255,0.2); text-align: center; }
.back-to-list-btn { background: rgba(0,0,0,0.6); border: none; color: #bbd9ff; padding: 8px 16px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; margin: 8px 12px 0 auto; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.back-to-list-btn:hover { background: rgba(0,229,255,0.2); color: white; }
.player-header-bar { display: flex; justify-content: flex-end; padding: 8px 12px 0; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); z-index: 1000; justify-content: center; align-items: center; }
.modal-content { background: var(--bg-surface); border-radius: 32px; padding: 32px; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
.modal-content input, .modal-content button { width: 100%; padding: 14px; margin-bottom: 12px; background: #1e2436; border: 1px solid #3a445c; border-radius: 60px; color: white; font-size: 1rem; text-align: center; outline: none; }
.modal-content button { font-weight: bold; cursor: pointer; transition: var(--transition); }
.modal-content button:hover { opacity: 0.85; transform: scale(0.98); }
.error-msg { color: #ff8888; margin-top: 8px; font-size: 0.8rem; }
.toast { position: fixed; bottom: 30px; right: 30px; background: rgba(0,229,255,0.9); color: #000; padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 3000; animation: fadeOut 2s ease forwards; }
@keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); display: none; } }
@media (max-width: 640px) { body { padding: 12px; } .section-box { padding: 16px; } .media-browser, .video-wrapper { height: 500px; } .panel-btn { min-width: 100px; font-size: 0.7rem; } }
</style>
</head>
<body>

<div class="wrapper">
    <div class="section-box">
        <div class="box-header-row">
            <div class="box-title">İNADINA TV</div>
            <div class="header-buttons">
                <div class="status-badge">⚡ AKTİF</div>
                <button id="changePasswordBtn" class="change-pwd-btn">🔑 +18 Şifre Değiştir</button>
            </div>
        </div>
        
        <div class="panel-selector" id="panelSelector">
            <div style="width:100%; text-align:center; color:#6c7a91; padding:10px;">Sunucuya bağlanılıyor...</div>
        </div>
        
        <div class="player-layout">
            <div id="channelListView" class="view-pane">
                <div class="media-browser">
                    <div class="browser-tabs">
                        <button class="tab-btn active" data-type="live">📡 CANLI TV</button>
                        <button class="tab-btn" data-type="vod">🎬 FİLMLER</button>
                        <button class="tab-btn" data-type="series">📺 DİZİLER</button>
                    </div>
                    <div id="browserBack" style="display:none;">← GERİ DÖN</div>
                    <div class="browser-list" id="browserList">
                        <div style="padding:20px;text-align:center;color:#6c7a91;">Paneller Yükleniyor...</div>
                    </div>
                </div>
            </div>

            <div id="playerView" class="view-pane hidden">
                <div class="video-wrapper">
                    <div class="player-header-bar">
                        <button id="goBackToListBtn" class="back-to-list-btn">← LİSTEYE DÖN</button>
                    </div>
                    <div class="video-inner">
                        <div id="videoOverlay" class="vid-overlay">✦ YAYIN BAŞLATILIYOR ✦</div>
                        <video id="videoPlayer" controls playsinline poster=""></video>
                    </div>
                    <div class="epg-display" id="epgDisplay">⏣ Bir yayın seçin</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ==================== KONFİGÜRASYON ====================
const ADULT_KEYWORDS = ["+18", "18+", "adult", "porno", "seks", "yetiskin", "erotik", "mature", "xxx", "nsfw"];
const USER_PASSWORD_KEY = "inadina_user_password";

let panels = {};
let currentPanel = null;
let browser = null;

function showToast(message, isSuccess = true) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isSuccess ? 'rgba(0,229,255,0.9)' : 'rgba(255,51,102,0.9)';
    toast.style.color = isSuccess ? '#000' : '#fff';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// ==================== API'DEN PANELLERİ ÇEK ====================
async function loadPanelsFromAPI() {
    try {
        const githubRawUrl = "https://raw.githubusercontent.com/inadinatv/xtreamplay/main/panels.json";
        const fetchUrl = `${githubRawUrl}?t=${new Date().getTime()}`;
        
        showToast("Sunucu aranıyor...", true);

        const response = await fetch(fetchUrl);
        
        if(response.ok) {
            panels = await response.json();
            showToast("Veriler başarıyla çekildi!", true);
        } else {
            alert(`BAĞLANTI HATASI!\nGitHub Hata Kodu: ${response.status}\n\nÇözüm: GitHub deponuzun (repository) Ayarlarından 'Private' (Gizli) olan görünürlüğü 'Public' (Herkese Açık) yapmalısınız.`);
        }
    } catch(e) {
        alert(`SİSTEM HATASI (Failed to fetch):\n\n${e.message}\n\nBu hata telefonunuzdaki HTML okuyucu uygulamanın güvenliğinden kaynaklanır. Dosyayı Vercel'e yükleyip link üzerinden test etmelisiniz.`);
    }
    
    renderPanelButtons();
    
    const panelKeys = Object.keys(panels);
    if (panelKeys.length > 0) {
        switchPanel(panelKeys[0]);
    } else {
        document.getElementById('browserList').innerHTML = '<div style="padding:20px;text-align:center;color:#6c7a91;">📭 Sistemde aktif sunucu bulunmamaktadır.</div>';
    }
}

// ==================== ANA EKRAN PANEL BUTONLARI ====================
function renderPanelButtons() {
    const container = document.getElementById('panelSelector');
    if (!container) return;
    container.innerHTML = '';
    const panelKeys = Object.keys(panels);
    if (panelKeys.length === 0) {
        container.innerHTML = '<div style="width:100%; text-align:center; color:#ff8a7a; padding:10px;">Sunucu Bulunamadı.</div>';
        return;
    }
    
    for (const key of panelKeys) {
        const panel = panels[key];
        const btn = document.createElement('button');
        btn.className = `panel-btn ${currentPanel === key ? 'active' : ''}`;
        btn.textContent = panel.name;
        btn.onclick = () => switchPanel(key);
        container.appendChild(btn);
    }
}

// ==================== +18 ŞİFRE YÖNETİMİ ====================
function isUserPasswordSet() { return localStorage.getItem(USER_PASSWORD_KEY) !== null; }
function getUserPassword() { return localStorage.getItem(USER_PASSWORD_KEY); }
function setUserPassword(pwd) { localStorage.setItem(USER_PASSWORD_KEY, pwd); }
function clearUserPassword() { localStorage.removeItem(USER_PASSWORD_KEY); }
function verifyUserPassword(inputPwd) { return inputPwd === getUserPassword(); }

function showSetupUserPasswordModal(onSuccess) {
    const modal = document.getElementById('passwordModal');
    const modalContent = document.getElementById('modalContent');
    modalContent.innerHTML = `
        <h3>🔐 +18 ŞİFRE BELİRLEYİN</h3>
        <p>Yetişkin içeriklere erişim için bir şifre oluşturun.</p>
        <input type="password" id="modalPassword" placeholder="Şifre belirleyin (min 3 karakter)">
        <input type="password" id="modalPasswordConfirm" placeholder="Şifreyi tekrar girin">
        <button id="submitPasswordBtn">Kaydet</button>
        <div id="modalError" class="error-msg"></div>
    `;
    modal.style.display = 'flex';
    const submitBtn = document.getElementById('submitPasswordBtn');
    const errorDiv = document.getElementById('modalError');
    submitBtn.onclick = () => {
        const pwd = document.getElementById('modalPassword').value.trim();
        const confirm = document.getElementById('modalPasswordConfirm').value.trim();
        if (pwd.length < 3) { errorDiv.innerText = '❌ En az 3 karakter'; return; }
        if (pwd !== confirm) { errorDiv.innerText = '❌ Şifreler eşleşmiyor'; return; }
        setUserPassword(pwd);
        modal.style.display = 'none';
        if (onSuccess) onSuccess();
        showToast("✅ +18 şifresi oluşturuldu!");
    };
}

function showUserPasswordModal(callback, title = "🔞 +18 İÇERİK", message = "Bu içeriğe erişmek için şifrenizi girin.") {
    const modal = document.getElementById('passwordModal');
    const modalContent = document.getElementById('modalContent');
    modalContent.innerHTML = `
        <h3>${title}</h3>
        <p>${message}</p>
        <input type="password" id="modalPassword" placeholder="Şifre">
        <button id="submitPasswordBtn">Giriş Yap</button>
        <button id="forgotPasswordBtn" style="background:transparent;border:1px solid rgba(255,255,255,0.2);">Şifremi unuttum</button>
        <div id="modalError" class="error-msg"></div>
    `;
    modal.style.display = 'flex';
    const input = document.getElementById('modalPassword');
    const submitBtn = document.getElementById('submitPasswordBtn');
    const forgotBtn = document.getElementById('forgotPasswordBtn');
    const errorDiv = document.getElementById('modalError');
    const closeModal = () => modal.style.display = 'none';
    submitBtn.onclick = () => {
        if (verifyUserPassword(input.value.trim())) { closeModal(); if (callback) callback(true); }
        else { errorDiv.innerText = '❌ Hatalı şifre!'; input.value = ''; input.focus(); }
    };
    forgotBtn.onclick = () => {
        closeModal(); clearUserPassword();
        showSetupUserPasswordModal(() => {
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab && browser && browser.config) browser.loadType(activeTab.dataset.type);
            if (callback) callback(false);
        });
    };
}

function showChangeUserPasswordModal() {
    if (!isUserPasswordSet()) { showSetupUserPasswordModal(); return; }
    const modal = document.getElementById('passwordModal');
    const modalContent = document.getElementById('modalContent');
    modalContent.innerHTML = `<h3>🔐 +18 ŞİFRE DEĞİŞTİR</h3><p>Mevcut şifrenizi girin.</p><input type="password" id="oldPassword" placeholder="Mevcut şifre"><button id="verifyOldBtn">Devam Et</button><button id="cancelChangeBtn" style="background:transparent;">İptal</button><div id="modalError" class="error-msg"></div>`;
    modal.style.display = 'flex';
    const oldInput = document.getElementById('oldPassword');
    const verifyBtn = document.getElementById('verifyOldBtn');
    
    document.getElementById('cancelChangeBtn').onclick = () => modal.style.display = 'none';

    const clean = () => modal.style.display = 'none';
    verifyBtn.onclick = () => {
        if (verifyUserPassword(oldInput.value.trim())) {
            modalContent.innerHTML = `<h3>🔐 YENİ ŞİFRE</h3><input type="password" id="newPassword" placeholder="Yeni şifre (min 3 karakter)"><input type="password" id="newPasswordConfirm" placeholder="Yeni şifre (tekrar)"><button id="saveNewPwdBtn">Kaydet</button><button id="cancelNewPwdBtn">İptal</button><div id="modalError2" class="error-msg"></div>`;
            const newPwd = document.getElementById('newPassword');
            const newConfirm = document.getElementById('newPasswordConfirm');
            const saveBtn = document.getElementById('saveNewPwdBtn');
            document.getElementById('cancelNewPwdBtn').onclick = () => modal.style.display = 'none';
            saveBtn.onclick = () => {
                if (newPwd.value.trim().length < 3) { document.getElementById('modalError2').innerText = '❌ En az 3 karakter'; return; }
                if (newPwd.value.trim() !== newConfirm.value.trim()) { document.getElementById('modalError2').innerText = '❌ Eşleşmiyor'; return; }
                setUserPassword(newPwd.value.trim()); clean(); showToast("✅ +18 şifresi değiştirildi!");
            };
        } else { document.getElementById('modalError').innerText = '❌ Hatalı şifre!'; oldInput.value = ''; }
    };
}

function isAdultContent(text) { if (!text) return false; return ADULT_KEYWORDS.some(kw => text.toLowerCase().includes(kw.toLowerCase())); }

// ==================== IPTV Browser Sınıfı ====================
class IPTVBrowser {
    constructor() { this.config = null; }
    
    // YENİ GÜÇLENDİRİLMİŞ FETCH SİSTEMİ VE HATA YAKALAYICI
    async fetchSafe(url) { 
        try { 
            // 1. Önce doğrudan bağlanmayı dener
            const r = await fetch(url); 
            const text = await r.text();
            try {
                return JSON.parse(text); // Veriyi JSON'a çevir
            } catch(e) {
                throw new Error("DirectConnectionFailed");
            }
        } catch(e) { 
            // 2. Doğrudan bağlantı başarısız olursa (CORS engeli) yeni Proxy'yi dener
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${url}`; 
            
            try {
                const r = await fetch(proxy); 
                const text = await r.text(); 
                
                try {
                    return JSON.parse(text); // Gelen veriyi okumayı dene
                } catch(parseError) {
                    // EĞER SUNUCU KANAL YERİNE HTML HATA SAYFASI GÖNDERİRSE EKRANA YAZDIR
                    alert("⚠️ IPTV Sunucusu reddetti veya hata sayfası gönderdi!\n\nGelen Yanıt:\n" + text.substring(0, 200) + "...");
                    throw new Error("Sunucu geçersiz veri (HTML) döndürdü.");
                }
            } catch(proxyError) {
                throw new Error("Proxy bağlantısı kurulamadı.");
            }
        } 
    }
    
    async loadType(type) {
        if (!this.config) { document.getElementById('browserList').innerHTML = '<div style="padding:20px;text-align:center;color:#ff8a7a;">⚠️ Sunucu seçilmedi.</div>'; return; }
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-type="${type}"]`).classList.add('active');
        const list = document.getElementById('browserList'); list.innerHTML = '<div style="padding:20px;text-align:center;">⏳ Kategoriler yükleniyor...</div>'; 
        document.getElementById('browserBack').style.display = 'none';
        let action = type === 'live' ? 'get_live_categories' : (type === 'vod' ? 'get_vod_categories' : 'get_series_categories');
        try {
            const data = await this.fetchSafe(`${this.config.api}&action=${action}`);
            list.innerHTML = '';
            if (!data || !data.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#ff8a7a;">⚠️ Kategori bulunamadı</div>'; return; }
            for (const cat of data) {
                const catName = cat.category_name || "İsimsiz";
                const isAdult = isAdultContent(catName);
                const el = document.createElement('div');
                el.className = 'list-item is-cat';
                el.innerHTML = `<span>${escapeHtml(catName)}</span><span class="${isAdult ? 'locked-badge' : 'unlocked-badge'}">${isAdult ? '🔞 Şifreli' : '🔓 Açık'}</span>`;
                el.onclick = () => this.handleCategoryClick(type, cat.category_id, catName);
                list.appendChild(el);
            }
        } catch(e) { list.innerHTML = `<div style="padding:20px;text-align:center;color:#ff7b72;">❌ Hata: ${e.message}</div>`; }
    }
    handleCategoryClick(type, catId, catName) {
        const loadStreams = () => this.loadStreams(type, catId);
        if (isAdultContent(catName)) {
            if (!isUserPasswordSet()) { showSetupUserPasswordModal(loadStreams); return; }
            showUserPasswordModal((success) => { if (success) loadStreams(); else document.getElementById('browserList').innerHTML = '<div style="padding:20px;text-align:center;color:#ff8888;">🔞 Erişim engellendi.</div>'; }, "🔞 +18 KATEGORİ", `"${catName}" kategorisine erişmek için şifre girin.`);
        } else { loadStreams(); }
    }
    async loadStreams(type, catId) {
        const list = document.getElementById('browserList'); list.innerHTML = '<div style="padding:20px;text-align:center;">📡 Yayınlar taranıyor...</div>';
        const backBtn = document.getElementById('browserBack'); backBtn.style.display = 'block';
        const activeType = document.querySelector('.tab-btn.active').dataset.type;
        backBtn.onclick = () => this.loadType(activeType);
        let action = type === 'live' ? 'get_live_streams' : (type === 'vod' ? 'get_vod_streams' : 'get_series');
        try {
            const data = await this.fetchSafe(`${this.config.api}&action=${action}&category_id=${catId}`);
            list.innerHTML = '';
            for (const item of data) {
                const name = item.name || item.title || "İsimsiz";
                const id = item.stream_id || item.series_id;
                let ext = (item.container_extension || "mp4").replace(/^\./, '');
                const el = document.createElement('div'); el.className = 'list-item'; el.textContent = name;
                el.onclick = () => this.play(type, id, ext, name);
                list.appendChild(el);
            }
            if (!data.length) list.innerHTML = '<div style="padding:20px;text-align:center;">📭 İçerik yok</div>';
        } catch(e) { list.innerHTML = `<div style="padding:20px;text-align:center;color:#ff7b72;">⚠️ Hata: ${e.message}</div>`; }
    }
    async play(type, id, ext, name) {
        const vid = document.getElementById('videoPlayer'); const overlay = document.getElementById('videoOverlay');
        overlay.style.display = 'block'; overlay.textContent = '⏳ BAĞLANTI KURULUYOR...'; vid.style.display = 'none';
        if (vid._hls) { vid._hls.destroy(); vid._hls = null; }
        const playStream = (url, streamName) => {
            this.showPlayer(); document.getElementById('epgDisplay').textContent = streamName || name;
            overlay.style.display = 'none'; vid.style.display = 'block';
            if (window.Hls && Hls.isSupported()) { const hls = new Hls(); vid._hls = hls; hls.loadSource(url); hls.attachMedia(vid); hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(e=>console.log(e))); } 
            else { vid.src = url; vid.play().catch(e=>console.log(e)); }
        };
        const checkAdult = (streamName, streamUrl) => {
            if (isAdultContent(streamName)) {
                if (!isUserPasswordSet()) { showSetupUserPasswordModal(() => playStream(streamUrl, streamName)); return; }
                showUserPasswordModal((success) => { if (success) playStream(streamUrl, streamName); else overlay.textContent = "🔞 Şifre girilmedi."; }, "🔞 +18 İÇERİK", "Bu yayın için şifre girin.");
            } else { playStream(streamUrl, streamName); }
        };
        if (type === 'series') {
            overlay.textContent = "🎬 Dizi yükleniyor...";
            try {
                const info = await this.fetchSafe(`${this.config.api}&action=get_series_info&series_id=${id}`);
                let episodes = [];
                if (info?.episodes) {
                    if (Array.isArray(info.episodes)) episodes = info.episodes;
                    else { const seasons = Object.keys(info.episodes); if (seasons.length) episodes = info.episodes[seasons[0]] || []; }
                }
                if (episodes.length) {
                    const ep = episodes[0];
                    const url = `${this.config.host}/series/${this.config.user}/${this.config.pass}/${ep.id}.${(ep.container_extension || "mp4").replace(/^\./, '')}`;
                    const epName = `${name} - S${ep.season} B${ep.episode_num}`;
                    checkAdult(epName, url);
                } else throw new Error("Bölüm bulunamadı");
            } catch(e) { overlay.textContent = "❌ Dizi yüklenemedi"; }
            return;
        }
        const url = type === 'live' ? `${this.config.host}/live/${this.config.user}/${this.config.pass}/${id}.m3u8` : `${this.config.host}/movie/${this.config.user}/${this.config.pass}/${id}.${ext}`;
        checkAdult(name, url);
    }
    showPlayer() { document.getElementById('channelListView').classList.add('hidden'); document.getElementById('playerView').classList.remove('hidden'); }
    showChannelList() { document.getElementById('channelListView').classList.remove('hidden'); document.getElementById('playerView').classList.add('hidden'); const vid = document.getElementById('videoPlayer'); if (vid._hls) vid._hls.destroy(); vid.pause(); vid.src = ''; document.getElementById('videoOverlay').textContent = '✦ KANAL LİSTESİ ✦'; document.getElementById('epgDisplay').textContent = '⏣ Bir yayın seçin'; }
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&':m==='<'?'<':'>'); }

function switchPanel(panelKey) {
    if (!panels[panelKey]) return;
    currentPanel = panelKey; 
    renderPanelButtons();
    const panel = panels[panelKey];
    if (!panel || !panel.host) return;
    browser.config = { 
        api: `${panel.host}/player_api.php?username=${panel.user}&password=${panel.pass}`, 
        host: panel.host, 
        user: panel.user, 
        pass: panel.pass 
    };
    browser.showChannelList();
    const activeTab = document.querySelector('.tab-btn.active');
    const type = activeTab ? activeTab.dataset.type : 'live';
    browser.loadType(type);
    showToast(`📡 ${panel.name} aktif edildi`);
}

// ==================== BAŞLAT ====================
document.addEventListener('DOMContentLoaded', () => {
    browser = new IPTVBrowser();
    loadPanelsFromAPI();
    
    document.getElementById('goBackToListBtn')?.addEventListener('click', () => browser.showChannelList());
    document.getElementById('changePasswordBtn')?.addEventListener('click', () => showChangeUserPasswordModal());
    document.querySelectorAll('.tab-btn').forEach(btn => { 
        btn.addEventListener('click', () => { 
            if(browser.config) browser.loadType(btn.dataset.type); 
            else showToast("Sistemde sunucu yok!", false); 
        }); 
    });
    if (!isUserPasswordSet()) { setTimeout(() => showSetupUserPasswordModal(), 600); }
});
</script>
